<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sanek</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Press+Start+2P&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <section class="main-section">
        <header>
            <p id="Score">Score</p>
            <p id="Lifes">Lifes</p>
        </header>
        <div class="Separador"><hr></div>
        <div class="Playground"></div>

        <div class="Death-Screen">
            <div class="Death-Screen-Image">
                <img id="Death-Image" src="assets/SNAKE_PHOTO.jpg" alt="">    
            </div>
            <div class="Death-Screen-Content">
                <h1>Game Over</h1>
                <button id="Restart-Button">Restart</button>
                <button id="Quit-Button">Quit</button>
            </div>
        </div>

        <footer>
            <p>o-O</p>
        </footer>
    </section>

    <script src="Javascript/script.js"></script>
</body>
</html>
